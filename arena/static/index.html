<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Desert Rats — Arena</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#000;color:#e8e8e8;
       font-family:"Courier New",ui-monospace,monospace;font-size:14px}
  header{display:flex;gap:24px;align-items:baseline;padding:8px 14px;
         border-bottom:2px solid #333}
  header h1{font-size:16px;margin:0;color:#ffd400;letter-spacing:2px}
  header .result{color:#ff4040;font-weight:bold}
  #layout{display:flex;gap:12px;padding:12px;align-items:flex-start}
  #screenwrap{flex:none}
  /* the authentic 256x192 screen, integer-scaled, hard pixels */
  #screen{width:768px;height:576px;image-rendering:pixelated;display:block;
          border:2px solid #333;cursor:crosshair;background:#000}
  #minimap{display:block;image-rendering:pixelated;border:2px solid #333;
           margin-top:8px;cursor:pointer}
  #side{width:330px;flex:none;display:flex;flex-direction:column;gap:10px}
  .box{border:2px solid #333;padding:8px;background:#050505}
  .box h2{margin:0 0 6px;font-size:13px;color:#ffd400;letter-spacing:1px}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:2px 10px}
  .kv b{color:#9a9a9a;font-weight:normal}
  button{background:#111;color:#e8e8e8;border:1px solid #555;
         font-family:inherit;font-size:13px;padding:4px 8px;cursor:pointer}
  button:hover{border-color:#00e0e0;color:#00e0e0}
  #log{height:170px;overflow-y:auto;font-size:12px;color:#8fd08f;white-space:pre-wrap}
  #newgame{position:fixed;inset:0;background:rgba(0,0,0,.85);
           display:flex;align-items:center;justify-content:center}
  #newgame .box{width:420px}
  select{background:#111;color:#e8e8e8;border:1px solid #555;
         font-family:inherit;font-size:13px;padding:3px;width:100%}
  .row{display:flex;gap:8px;margin:6px 0;align-items:center}
  .row label{width:80px;color:#9a9a9a}
  .hint{color:#777;font-size:12px;margin-top:4px}
  #artwarn{color:#ffb000;font-size:12px}
</style>
</head>
<body>
<header>
  <h1>DESERT RATS</h1>
  <span id="scen"></span>
  <span id="turn"></span>
  <span class="result" id="result"></span>
  <span id="artwarn"></span>
  <span style="margin-left:auto"><button onclick="showNewGame()">NEW GAME</button></span>
</header>

<div id="layout">
  <div id="screenwrap">
    <img id="screen" alt="game screen">
    <canvas id="minimap"></canvas>
    <div class="hint">Arrows scroll &middot; click map: select / set destination &middot; click panel: orders &middot;
      keys M A H F T &middot; ENTER ends turn</div>
  </div>
  <div id="side">
    <div class="box">
      <h2>UNIT REPORT</h2>
      <div id="report" class="kv"><b>—</b><span>select a unit</span></div>
      <div class="hint" id="orderhint"></div>
    </div>
    <div class="box"><h2>SIGNALS LOG</h2><div id="log"></div></div>
  </div>
</div>

<div id="newgame">
  <div class="box">
    <h2>NEW GAME</h2>
    <div class="row"><label>Scenario</label><select id="ng-scen"></select></div>
    <div class="row"><label>British</label><select id="ng-brit"><option>human</option><option>ai</option></select></div>
    <div class="row"><label>Axis</label><select id="ng-axis"><option selected>ai</option><option>human</option></select></div>
    <div class="row"><button onclick="startGame()">BEGIN ▸</button></div>
    <div class="hint">Engine and screen both render server-side — the browser holds no rules and no art.</div>
  </div>
</div>

<script>
"use strict";
// The client is the authentic screen plus chrome: it maps clicks/keys to
// engine calls and displays server-rendered pixels. No rules, no art here.
const SCALE = 3;                       // 256x192 -> 768x576
const KEY_ORDERS = {m:1, a:2, h:3, t:4, f:7};
const NEEDS_DEST = new Set([1,2,4]);
const MINI_CELL = 4;

let UI=null, MAP=null, STATE=null, GAME_ID=null;
let ox=0, oy=0;            // viewport origin (cells)
let selected=null;         // oob_index
let pendingOrder=null;     // order code awaiting a destination click

const $=id=>document.getElementById(id);
const scr=$("screen"), mini=$("minimap"), mctx=mini.getContext("2d");

async function api(path, body){
  const r=await fetch(path, body?{method:"POST",headers:{"Content-Type":"application/json"},
                                  body:JSON.stringify(body)}:undefined);
  if(!r.ok){ const t=await r.text(); throw new Error(t); }
  return r.json();
}

// ── boot ────────────────────────────────────────────────────────────────
async function boot(){
  [UI, MAP]=await Promise.all([api("/api/ui"), api("/api/map")]);
  if(!UI.og_art) $("artwarn").textContent=
    "⚠ local og art not found — degraded screen (see README: extract_render_tables.py)";
  mini.width=MAP.width*MINI_CELL; mini.height=MAP.height*MINI_CELL;
  const scens=await api("/api/scenarios");
  $("ng-scen").innerHTML=scens.map(s=>
    `<option value="${s.index}">${s.name} — ${s.start_date}</option>`).join("");
}
function showNewGame(){ $("newgame").style.display="flex"; }
async function startGame(){
  const req={scenario_index:+$("ng-scen").value,
             british:$("ng-brit").value, axis:$("ng-axis").value};
  STATE=await api("/api/games",req); GAME_ID=STATE.game_id;
  selected=null; pendingOrder=null;
  $("newgame").style.display="none";
  centerOnAction();
  refresh();
}
function centerOnAction(){
  // open the viewport on the front (midpoint) or first human unit
  const mid=STATE.midpoint;
  let cx = mid!=null ? mid : 50;
  const humanSides=Object.entries(STATE.modes).filter(([,m])=>m==="human").map(([s])=>s.toUpperCase());
  const mine=STATE.units.filter(u=>humanSides.includes(u.side));
  let cy = mine.length ? mine.reduce((a,u)=>a+u.y,0)/mine.length : MAP.height/2;
  ox=clampOx(Math.round(cx-UI.view_cells/2));
  oy=clampOy(Math.round(cy-UI.view_cells/2));
}
const clampOx=v=>Math.min(Math.max(v,0),Math.max(0,MAP.width-UI.view_cells));
const clampOy=v=>Math.min(Math.max(v,0),Math.max(0,MAP.height-UI.view_cells));

// ── screen + minimap ────────────────────────────────────────────────────
function drawScreen(){
  if(!GAME_ID) return;
  const q=new URLSearchParams({ox,oy,t:Date.now()});
  if(selected!=null) q.set("sel",selected);
  scr.src=`/api/games/${GAME_ID}/screen?`+q;
}
function drawMini(){
  for(let y=0;y<MAP.height;y++) for(let x=0;x<MAP.width;x++){
    const c=MAP.legend[String(MAP.terrain[y][x])]||MAP.legend["0"];
    mctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;
    mctx.fillRect(x*MINI_CELL,y*MINI_CELL,MINI_CELL,MINI_CELL);
  }
  if(STATE) for(const u of STATE.units){
    const c=MAP.nation_colours[u.nationality]||[255,255,255];
    mctx.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;
    mctx.fillRect(u.x*MINI_CELL,u.y*MINI_CELL,MINI_CELL*u.footprint,MINI_CELL*u.footprint);
  }
  mctx.strokeStyle="#fff"; mctx.lineWidth=1.5;
  mctx.strokeRect(ox*MINI_CELL,oy*MINI_CELL,UI.view_cells*MINI_CELL,UI.view_cells*MINI_CELL);
}

// ── HUD / report ────────────────────────────────────────────────────────
function refresh(){
  $("scen").textContent=STATE.scenario.name.toUpperCase()+"  "+STATE.date.join(" ");
  $("turn").textContent="TURN "+STATE.turn;
  $("result").textContent=STATE.result?("★ "+STATE.result.replaceAll("_"," ")):"";
  $("log").textContent=STATE.log.join("\n");
  $("log").scrollTop=1e9;
  report(); drawScreen(); drawMini();
}
function humanSide(side){ return STATE.modes[side==="BRITISH"?"british":"axis"]==="human"; }
function selUnit(){ return STATE&&STATE.units.find(u=>u.oob_index===selected); }
function report(){
  const u=selUnit(), box=$("report"), hint=$("orderhint");
  hint.textContent=pendingOrder!=null?"Click the map to set a destination.":"";
  if(!u){ box.innerHTML="<b>—</b><span>select a unit</span>"; return; }
  box.innerHTML=`
    <b>Unit</b><span>${u.name}</span>
    <b>Nat.</b><span>${u.nationality} (${u.branch})</span>
    <b>Strength</b><span>${u.strength}</span>
    <b>Efficiency</b><span>${u.efficiency}%</span>
    <b>Morale</b><span>${u.morale}</span>
    <b>Supply</b><span>${u.supply_band??"—"}${u.supply!=null?` (${u.supply})`:""}</span>
    <b>Order</b><span>${u.order_name}${u.travel?" (travelling)":""}</span>
    <b>Pos</b><span>${u.x},${u.y}${u.dest_x!=null?` → ${u.dest_x},${u.dest_y}`:""}</span>`;
  if(!humanSide(u.side)) hint.textContent="AI-controlled unit.";
}

// ── orders ──────────────────────────────────────────────────────────────
async function issueOrder(code, dx, dy){
  const u=selUnit();
  if(!u||!humanSide(u.side)||STATE.result) return;
  if(NEEDS_DEST.has(code)&&dx==null){ pendingOrder=code; report(); return; }
  const o={oob_index:u.oob_index,order:code};
  if(dx!=null){ o.dest_x=dx; o.dest_y=dy; }
  try{ STATE=await api(`/api/games/${GAME_ID}/orders`,{orders:[o]}); }
  catch(e){ alert(e.message); }
  pendingOrder=null;
  refresh();
}
async function endTurn(){
  if(!GAME_ID||STATE.result) return;
  try{ STATE=await api(`/api/games/${GAME_ID}/end-turn`,{}); }
  catch(e){ alert(e.message); }
  pendingOrder=null;
  refresh();
}

// ── interaction: the screen itself ──────────────────────────────────────
scr.addEventListener("click",ev=>{
  if(!STATE) return;
  const r=scr.getBoundingClientRect();
  const sx=Math.floor((ev.clientX-r.left)/SCALE), sy=Math.floor((ev.clientY-r.top)/SCALE);
  if(sx<UI.panel_x&&sy<UI.bottom_y){                    // map viewport
    const x=ox+(sx>>3), y=oy+(sy>>3);
    if(pendingOrder!=null&&selected!=null){ issueOrder(pendingOrder,x,y); return; }
    const hit=STATE.units.find(u=>
      x>=u.x&&x<u.x+u.footprint&&y>=u.y&&y<u.y+u.footprint);
    selected=hit?hit.oob_index:null;
    report(); drawScreen();
  } else if(sx>=UI.panel_x){                            // order panel
    const row=sy>>3;
    const item=UI.menu.find(m=>m.row===row);
    if(!item) return;
    if(item.order!=null) issueOrder(item.order);
    else if(item.label.includes("END")) endTurn();
    // REPORT row: the HTML report panel is always live
  }
});
document.addEventListener("keydown",ev=>{
  if(!STATE||$("newgame").style.display==="flex") return;
  const k=ev.key;
  if(k==="ArrowLeft"){ ox=clampOx(ox-2); drawScreen(); drawMini(); }
  else if(k==="ArrowRight"){ ox=clampOx(ox+2); drawScreen(); drawMini(); }
  else if(k==="ArrowUp"){ oy=clampOy(oy-2); drawScreen(); drawMini(); }
  else if(k==="ArrowDown"){ oy=clampOy(oy+2); drawScreen(); drawMini(); }
  else if(k==="Enter"){ endTurn(); }
  else if(KEY_ORDERS[k.toLowerCase()]!=null){ issueOrder(KEY_ORDERS[k.toLowerCase()]); }
  else return;
  ev.preventDefault();
});
mini.addEventListener("click",ev=>{
  const r=mini.getBoundingClientRect();
  ox=clampOx(Math.floor((ev.clientX-r.left)/MINI_CELL)-(UI.view_cells>>1));
  oy=clampOy(Math.floor((ev.clientY-r.top)/MINI_CELL)-(UI.view_cells>>1));
  drawScreen(); drawMini();
});

boot();
</script>
</body>
</html>
